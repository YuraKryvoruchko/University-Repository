        <p align="center">
            <font color="#008080" size="7"><b>Результат у консолі - натисни клавішу F12</b></font><br>
        </p>

    <script>
        for (var i = 1; i <= 100; i++) {
            if (i < 2) {
                continue;
            }
            if (i == 2) {
                console.log(i)
                continue;
            }
            else if (i % 2 == 0) {
                continue;
            }

            var isPrime = true;
            for (var j = 2; j < Math.sqrt(i) + 1; j++) {
                if (i % j == 0) {
                    isPrime = false;
                    break;
                }
            }

            if (isPrime) {
                console.log(i);
            }
        }
    </script>
