<!DOCTYPE html>
<html>
    <head>
        <title>Лабораторна робота №15 – Криворучко Юрій</title>

        <link rel="stylesheet" type="text/css" href="styles.css">
    </head>
    <body>

    <script>
        var number = prompt("Введіть число від 1 до 7:");
        number = Number(number);

        switch(number) {
            case 1:
                alert("Понеділок");
                break;
            case 2:
                alert("Вівторок");
                break;
            case 3:
                alert("Середа");
                break;
            case 4:
                alert("Четверг");
                break;
            case 5:
                alert("П'ятниця");
                break;
            case 6:
                alert("Субота");
                break;
            case 7:
                alert("Неділя");
                break;
            default:
                alert("Потрібно ввести число від 1 до 7");
        }
    </script>

        <p align="right"><i><u>Студент групи 305-ТН Криворучко Ю.В.</u></i></p>
    </body>
</html>
