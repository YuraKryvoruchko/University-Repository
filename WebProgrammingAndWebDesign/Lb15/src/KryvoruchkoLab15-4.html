    <body>

    <script>
        var number = prompt("Введіть число від 1 до 12");
        number = Number(number);

        if (number < 1 || number > 12) {
            alert("Потрібно число від 1 до 12");
        }
        else if (number < 3 || number == 12) {
            alert("Зима");
        }
        else if (number < 6) {
            alert("Весна");
        }
        else if (number < 9) {
            alert("Літо")
        }
        else {
            alert("Осінь");
        }
    </script>
