<html>

        <title>Лабораторна робота №18 – Криворучко Юрій</title>

        <meta name="Keywords" content="html, lab, web programming, web design, Kryvoruchko">
    </head>
    <body>
        <input type="text" id="side" placeholder="Input side"><br>
        <input type="text" id="count" placeholder="Input count">
        <button onclick="calculate()">OK</button>
        <p id="output">Perimeter: </p>
    <script>
        function calculate() {
            const side = Number(document.getElementById("side").value);
            const count = Number(document.getElementById("count").value);
            const result = perimeter(side, count);
            document.getElementById("output").textContent = "Perimeter: " + result;
        }

        function perimeter(side, count) {
            return side * count;
        }
    </script>
