    <body>
    <script>
        let array = ["first", 5, 10, true, "hello world"];
        let newArray = transformArray(array);
        alert("Original array: " + array +"\nNew array: " + newArray);

        function transformArray(arr) {
            let result = [];

            for (let i = arr.length - 1; i >= 0; i--) {
                let item = arr[i];

                if (typeof item === "number") {
                    result.push(item * item); // квадрат числа
                } else {
                    result.push(item); // без змін
                }
            }

            return result;
        }
    </script>
