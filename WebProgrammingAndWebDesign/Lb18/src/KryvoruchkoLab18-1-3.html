    <body>
    <script>
        let n = Number(prompt("Input N: "));
        count(n);

        function count(n) {
            for(i = 1; i < n; i++) {
                if (i % 3 && i % 5) {
                    console.log("fizzbuzz");
                }
                else if (i % 3) {
                    console.log("fizz");
                }
                else if (i % 5) {
                    console.log("buzz");
                }
                else {
                    console.log(i);
                }
            }
        }
    </script>
