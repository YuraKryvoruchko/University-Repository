    <body>
    <script>
        let number1 = Number(prompt("Input N: "));
        let number2 = Number(prompt("Input X: "));
        let number3 = Number(prompt("Input Y: "));

        alert("Result with if: " + isDivisibleWithIf(number1, number2, number3));
        alert("Result with t-operator: " + isDivisibleWithTOperator(number1, number2, number3));
        alert("Result with without if and t-operator: " + isDivisibleWithoutIfAndTOperator(number1, number2, number3));

        function isDivisibleWithIf(n, x, y) {
            if (n % x == 0 && n % y == 0) {
                return true;
            }
            else {
                return false;
            }
        }
        function isDivisibleWithTOperator(n, x, y) {
            return n % x == 0 && n % y == 0 ? true : false;
        }
        function isDivisibleWithoutIfAndTOperator(n, x, y) {
            return n % x == 0 && n % y == 0;
        }
    </script>
