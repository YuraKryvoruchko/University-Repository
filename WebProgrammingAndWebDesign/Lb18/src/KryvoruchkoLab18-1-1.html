    <body>
        <input type="text" id="input" placeholder="Input number">
        <button onclick="calculate()">OK</button>
        <p id="output">Result: </p>
    <script>
        function calculate() {
            const value = Number(document.getElementById("input").value);
            const result = seconds(value);
            document.getElementById("output").textContent = "Result: " + result;
        }

        function seconds(total) {
            return total % 60;
        }
    </script>
