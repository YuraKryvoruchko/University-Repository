    <script>
        function removeDuplicates(arr) {
            return [...new Set(arr)];
        }

        let input = [1, 2, 2, 4, 5, 4, 7, 8, 7, 3, 6];
        let result = removeDuplicates(input);

        alert("Input: " + input + "\nOutput:" + result);
