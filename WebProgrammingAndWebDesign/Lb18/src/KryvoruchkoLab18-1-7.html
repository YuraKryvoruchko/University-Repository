    <body>
    <script>
        let arr = [];

        for (let i = 0; i < 5; i++) {
            arr[i] = [];
            for (let j = 0; j < 5; j++) {
                arr[i][j] = Math.floor(Math.random() * 21) - 10;
            }
        }

        for (let i = 0; i < 5; i++) {
            if (arr[i][i] < 0) {
                arr[i][i] = 0;
            } else if (arr[i][i] > 0) {
                arr[i][i] = 1;
            }
        }

        let text = "";
        for (let i = 0; i < 5; i++) {
            text += arr[i].join(" ") + "\n";
        }
        alert(text);
    </script>

    </body>
